<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ener-VDO Admin</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --panel: #22223a;
        --text: #ffffff;
        --muted: #b8b8c9;
        --line: #3b3b5e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      h1, h2 { margin: 0 0 12px; }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input, select, button {
        background: #121225;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
      }
      input, select { min-width: 220px; }
      button { cursor: pointer; }
      button:hover { opacity: 0.9; }
      .status {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .queued { background: #767676; }
      .scripting { background: #2f6dff; }
      .voicing { background: #8e44ad; }
      .rendering { background: #e67e22; }
      .ready_review { background: #f1c40f; color: #111; }
      .approved { background: #2ecc71; }
      .published { background: #1e8f4f; }
      .failed { background: #e74c3c; }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      th { color: var(--muted); font-weight: 700; }
      .actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .script-row td {
        background: #17172b;
        white-space: pre-wrap;
        color: #d9d9ea;
      }
      .msg { margin-top: 8px; color: #9ad2ff; font-size: 13px; min-height: 18px; }
      .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
      .tab-btn.active { background: #2f6dff; }
      .section { display: none; }
      .section.active { display: block; }
      @media (max-width: 900px) {
        table { font-size: 12px; }
        input, select { min-width: 180px; }
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: none;
        z-index: 50;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        max-width: 760px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        padding: 16px;
      }
      .textarea {
        width: 100%;
        min-width: 0;
        min-height: 88px;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Ener-VDO Admin</h1>
        <div class="row">
          <label for="adminKey">Admin Key</label>
          <input id="adminKey" type="password" placeholder="ADMIN_API_KEY" />
          <button id="saveKeyBtn">Save Key</button>
          <button id="refreshBtn">Refresh</button>
        </div>
        <div id="message" class="msg"></div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="jobsSection">Video Jobs</button>
        <button class="tab-btn" data-tab="footageSection">Footage Library</button>
      </div>

      <section id="jobsSection" class="section active">
        <div class="card">
          <h2>สร้าง Job ใหม่</h2>
          <div class="row">
            <select id="sourceType">
              <option value="scan_result">scan_result</option>
              <option value="temple_footage">temple_footage</option>
            </select>
            <input id="sourceId" placeholder="source_id (UUID)" />
            <input id="templeName" placeholder="temple_name" style="display:none;" />
            <input id="templeScene" placeholder="scene" style="display:none;" />
            <input id="templeDate" placeholder="date" style="display:none;" />
            <select id="jobFootageSelect">
              <option value="">Auto select background</option>
            </select>
            <button id="createBtn">สร้าง Job</button>
          </div>
        </div>

        <div class="card">
          <h2>Jobs</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Status</th>
                <th>Footage</th>
                <th>Script</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="footageSection" class="section">
        <div class="card">
          <h2>Upload Footage</h2>
          <div class="row">
            <input id="footageFile" type="file" accept="video/*" />
            <input id="footageTempleName" placeholder="temple_name (optional)" />
            <select id="footageClipType">
              <option value="temple_exterior">temple_exterior</option>
              <option value="buddha_image">buddha_image</option>
              <option value="incense">incense</option>
              <option value="walking">walking</option>
              <option value="market">market</option>
              <option value="amulet_table">amulet_table</option>
              <option value="generic_spiritual">generic_spiritual</option>
            </select>
            <input id="footageSceneLabel" placeholder="scene_label (optional)" />
            <label><input id="footageAmbient" type="checkbox" checked /> ambient_audio_enabled</label>
            <button id="uploadFootageBtn">Upload</button>
          </div>
        </div>

        <div class="card">
          <h2>Footage Clips</h2>
          <div class="row" style="margin-bottom:10px">
            <select id="footageStatusFilter">
              <option value="">status: all (exclude deleted)</option>
              <option value="active">active</option>
              <option value="hidden">hidden</option>
              <option value="deleted">deleted</option>
            </select>
            <select id="footageTypeFilter">
              <option value="">clip_type: all</option>
              <option value="temple_exterior">temple_exterior</option>
              <option value="buddha_image">buddha_image</option>
              <option value="incense">incense</option>
              <option value="walking">walking</option>
              <option value="market">market</option>
              <option value="amulet_table">amulet_table</option>
              <option value="generic_spiritual">generic_spiritual</option>
            </select>
            <input id="footageTempleFilter" placeholder="filter temple_name" />
            <button id="refreshFootageBtn">Refresh Footage</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>clip_type</th>
                <th>temple_name</th>
                <th>scene_label</th>
                <th>status</th>
                <th>ambient</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="footageBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="visualsOverlay" class="modal-overlay" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-labelledby="visualsTitle">
        <h2 id="visualsTitle">Visual assets · Job <span id="visualsJobLabel"></span></h2>
        <p style="color: var(--muted); font-size: 13px; margin: 0 0 12px">
          ภาพประกอบเชิงบรรยากาศ — ไม่แทนที่ footage จริง
        </p>
        <div class="row" style="margin-bottom: 8px">
          <select id="vaAssetType">
            <option value="opening_card">opening_card</option>
            <option value="transition_card">transition_card</option>
            <option value="explainer_card">explainer_card</option>
            <option value="cta_card">cta_card</option>
            <option value="product_support">product_support</option>
            <option value="motion_background">motion_background</option>
          </select>
          <select id="vaInsertPos">
            <option value="intro">intro</option>
            <option value="middle">middle</option>
            <option value="before_cta">before_cta</option>
            <option value="outro">outro</option>
          </select>
          <label style="color: var(--muted); font-size: 13px"
            >duration_sec
            <input id="vaDuration" type="number" step="0.5" value="3" style="width: 72px" />
          </label>
          <label style="color: var(--muted); font-size: 13px"
            >sort
            <input id="vaSort" type="number" value="0" style="width: 64px" />
          </label>
        </div>
        <textarea id="vaPrompt" class="textarea" placeholder="prompt_text (ข้อความหลักบนการ์ด)"></textarea>
        <div class="row" style="margin-top: 10px">
          <button type="button" id="vaAddBtn">Add visual</button>
          <button type="button" id="vaRefreshBtn">Refresh list</button>
          <button type="button" id="vaCloseBtn">Close</button>
        </div>
        <div id="vaMsg" class="msg"></div>
        <div class="card" style="margin-top: 14px; border: none; padding: 0">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Position</th>
                <th>Dur</th>
                <th>Status</th>
                <th>Prompt</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="vaBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const LS_KEY = "ener_vdo_admin_key";
      const apiBase = window.location.origin;
      const adminKeyEl = document.getElementById("adminKey");
      const msgEl = document.getElementById("message");
      const sourceTypeEl = document.getElementById("sourceType");
      const sourceIdEl = document.getElementById("sourceId");
      const templeNameEl = document.getElementById("templeName");
      const templeSceneEl = document.getElementById("templeScene");
      const templeDateEl = document.getElementById("templeDate");
      const jobFootageSelectEl = document.getElementById("jobFootageSelect");
      const jobsBody = document.getElementById("jobsBody");
      const footageBody = document.getElementById("footageBody");
      const footageFileEl = document.getElementById("footageFile");
      const footageTempleNameEl = document.getElementById("footageTempleName");
      const footageClipTypeEl = document.getElementById("footageClipType");
      const footageSceneLabelEl = document.getElementById("footageSceneLabel");
      const footageAmbientEl = document.getElementById("footageAmbient");
      const footageStatusFilterEl = document.getElementById("footageStatusFilter");
      const footageTypeFilterEl = document.getElementById("footageTypeFilter");
      const footageTempleFilterEl = document.getElementById("footageTempleFilter");
      const expandedScripts = new Set();
      let visualsJobId = null;

      function statusClass(status) {
        return String(status || "").replace(/\s+/g, "_");
      }
      function short(s, n) {
        if (!s) return "-";
        const t = String(s);
        return t.length > n ? t.slice(0, n) + "..." : t;
      }
      function showMsg(text) {
        msgEl.textContent = text || "";
      }
      function getKey() {
        return localStorage.getItem(LS_KEY) || "";
      }
      function setKey(v) {
        localStorage.setItem(LS_KEY, v || "");
      }
      async function api(path, opts = {}) {
        const key = getKey();
        const headers = Object.assign(
          { "Content-Type": "application/json", "X-Admin-Key": key },
          opts.headers || {}
        );
        const res = await fetch(apiBase + path, Object.assign({}, opts, { headers }));
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }
      function toggleSourceFields() {
        const isScan = sourceTypeEl.value === "scan_result";
        sourceIdEl.style.display = isScan ? "" : "none";
        templeNameEl.style.display = isScan ? "none" : "";
        templeSceneEl.style.display = isScan ? "none" : "";
        templeDateEl.style.display = isScan ? "none" : "";
      }
      async function createJob() {
        try {
          const source_type = sourceTypeEl.value;
          const body = { source_type };
          if (source_type === "scan_result") {
            if (!sourceIdEl.value.trim()) throw new Error("กรุณาใส่ source_id");
            body.source_id = sourceIdEl.value.trim();
          } else {
            body.source_metadata = {
              temple_name: templeNameEl.value.trim(),
              scene: templeSceneEl.value.trim(),
              date: templeDateEl.value.trim(),
            };
          }
          if (jobFootageSelectEl.value) body.footage_clip_id = jobFootageSelectEl.value;
          await api("/admin/video-jobs", { method: "POST", body: JSON.stringify(body) });
          showMsg("สร้าง job สำเร็จ");
          await loadJobs();
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      function activateTab(tabId) {
        document.querySelectorAll(".section").forEach((el) => el.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add("active");
      }
      function renderActions(job) {
        const actions = [];
        actions.push(`<button data-action="preview" data-id="${job.id}">Preview</button>`);
        if (job.status === "ready_review") {
          actions.push(`<button data-action="approve" data-id="${job.id}">Approve</button>`);
        }
        if (job.status === "failed" || job.status === "ready_review") {
          const fs = Number.isFinite(Number(job.subtitle_fontsize))
            ? Math.min(30, Math.max(6, Number(job.subtitle_fontsize)))
            : 8;
          actions.push(
            `<input type="range" min="6" max="30" value="${fs}" style="width:80px" title="Font size" data-font-slider-for="${job.id}" oninput="this.nextElementSibling.textContent=this.value">`
          );
          actions.push(`<span style="color:#aaa;font-size:12px">${fs}</span>`);
          actions.push(`<button data-action="retry" data-id="${job.id}">Retry</button>`);
        }
        actions.push(`<button data-action="set-footage" data-id="${job.id}">Set Footage</button>`);
        actions.push(`<button data-action="visuals" data-id="${job.id}">Visuals</button>`);
        actions.push(`<button data-action="script" data-id="${job.id}">Script</button>`);
        return `<div class="actions">${actions.join("")}</div>`;
      }
      function renderJobs(jobs) {
        const rows = [];
        for (const job of jobs) {
          rows.push(`
            <tr>
              <td>${short(job.id, 5)}</td>
              <td>${job.source_type || "-"}</td>
              <td><span class="status ${statusClass(job.status)}">${job.status || "-"}</span></td>
              <td>${job.footage_clip_id ? short(job.footage_clip_id, 5) : "auto"}</td>
              <td>${short(job.script_text, 50)}</td>
              <td>${job.created_at ? new Date(job.created_at).toLocaleString() : "-"}</td>
              <td>${renderActions(job)}</td>
            </tr>
          `);
          if (expandedScripts.has(job.id) && job.script_text) {
            rows.push(`
              <tr class="script-row">
                <td colspan="7">${job.script_text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</td>
              </tr>
            `);
          }
        }
        jobsBody.innerHTML = rows.join("");
      }
      function renderFootageSelect(clips) {
        const opts = ['<option value="">Auto select background</option>'];
        for (const c of clips) {
          const label = `${c.clip_type} | ${c.temple_name || "-"} | ${c.scene_label || "-"}`;
          opts.push(`<option value="${c.id}">${label}</option>`);
        }
        jobFootageSelectEl.innerHTML = opts.join("");
      }
      async function refreshActiveFootageSelect() {
        try {
          const data = await api("/admin/footage-clips?status=active");
          renderFootageSelect(data.clips || []);
        } catch (e) {
          console.warn(e);
        }
      }
      function renderFootage(clips) {
        const rows = clips.map((c) => `
          <tr>
            <td>${short(c.id, 5)}</td>
            <td>${c.clip_type || "-"}</td>
            <td>${c.temple_name || "-"}</td>
            <td>${c.scene_label || "-"}</td>
            <td>${c.status || "-"}</td>
            <td>${c.ambient_audio_enabled ? "on" : "off"}</td>
            <td class="actions">
              <button data-f-action="preview" data-id="${c.id}">Preview</button>
              <button data-f-action="toggle" data-id="${c.id}" data-status="${c.status}">
                ${c.status === "hidden" ? "Activate" : "Hide"}
              </button>
              <button data-f-action="delete" data-id="${c.id}">Delete</button>
            </td>
          </tr>
        `);
        footageBody.innerHTML = rows.join("");
      }
      async function loadJobs() {
        try {
          const data = await api("/admin/video-jobs");
          renderJobs(data.jobs || []);
          showMsg(`อัปเดตล่าสุด: ${new Date().toLocaleTimeString()}`);
        } catch (e) {
          showMsg("โหลด jobs ไม่สำเร็จ");
          alert(e.message || String(e));
        }
      }
      async function loadFootage() {
        try {
          const q = new URLSearchParams();
          if (footageStatusFilterEl.value) q.set("status", footageStatusFilterEl.value);
          if (footageTypeFilterEl.value) q.set("clip_type", footageTypeFilterEl.value);
          if (footageTempleFilterEl.value.trim()) q.set("temple_name", footageTempleFilterEl.value.trim());
          const path = "/admin/footage-clips" + (q.toString() ? `?${q.toString()}` : "");
          const data = await api(path);
          const clips = data.clips || [];
          renderFootage(clips);
          await refreshActiveFootageSelect();
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      async function uploadFootage() {
        try {
          const file = footageFileEl.files && footageFileEl.files[0];
          if (!file) throw new Error("กรุณาเลือกไฟล์วิดีโอ");
          if (!file.type.startsWith("video/")) throw new Error("รองรับเฉพาะไฟล์วิดีโอ");
          const fd = new FormData();
          fd.append("video", file);
          fd.append("clip_type", footageClipTypeEl.value);
          fd.append("temple_name", footageTempleNameEl.value.trim());
          fd.append("scene_label", footageSceneLabelEl.value.trim());
          fd.append("ambient_audio_enabled", footageAmbientEl.checked ? "true" : "false");
          const key = getKey();
          const res = await fetch(apiBase + "/admin/footage-clips", {
            method: "POST",
            headers: { "X-Admin-Key": key },
            body: fd,
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          showMsg("อัปโหลด footage สำเร็จ");
          footageFileEl.value = "";
          await loadFootage();
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      async function onActionClick(ev) {
        const btn = ev.target.closest("button[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        try {
          if (action === "preview") {
            const data = await api(`/admin/video-jobs/${id}/preview`);
            if (!data.video_url) throw new Error("ไม่มี video_url");
            window.open(data.video_url, "_blank");
          } else if (action === "approve") {
            await api(`/admin/video-jobs/${id}/approve`, { method: "PATCH" });
            await loadJobs();
          } else if (action === "retry") {
            const slider = jobsBody.querySelector(`input[data-font-slider-for="${id}"]`);
            const sliderValue = slider ? Number.parseInt(slider.value, 10) : 8;
            await api(`/admin/video-jobs/${id}/retry`, {
              method: "PATCH",
              body: JSON.stringify({
                from: "queued",
                subtitle_fontsize: Number.isFinite(sliderValue) ? sliderValue : 8,
              }),
            });
            await loadJobs();
          } else if (action === "script") {
            if (expandedScripts.has(id)) expandedScripts.delete(id);
            else expandedScripts.add(id);
            await loadJobs();
          } else if (action === "set-footage") {
            const cur = prompt("ใส่ footage_clip_id (เว้นว่าง = auto)");
            const value = cur && cur.trim() ? cur.trim() : null;
            await api(`/admin/video-jobs/${id}/footage`, {
              method: "PATCH",
              body: JSON.stringify({ footage_clip_id: value }),
            });
            await loadJobs();
          } else if (action === "visuals") {
            openVisualsPanel(id);
          }
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      async function onFootageActionClick(ev) {
        const btn = ev.target.closest("button[data-f-action]");
        if (!btn) return;
        const action = btn.dataset.fAction;
        const id = btn.dataset.id;
        try {
          if (action === "preview") {
            const data = await api(`/admin/footage-clips/${id}/preview`);
            if (!data.preview_url) throw new Error("ไม่มี preview_url");
            window.open(data.preview_url, "_blank");
          } else if (action === "toggle") {
            const current = btn.dataset.status;
            const next = current === "hidden" ? "active" : "hidden";
            await api(`/admin/footage-clips/${id}`, {
              method: "PATCH",
              body: JSON.stringify({ status: next }),
            });
            await loadFootage();
          } else if (action === "delete") {
            await api(`/admin/footage-clips/${id}`, { method: "DELETE" });
            await loadFootage();
          }
        } catch (e) {
          alert(e.message || String(e));
        }
      }

      document.getElementById("saveKeyBtn").addEventListener("click", () => {
        setKey(adminKeyEl.value.trim());
        showMsg("บันทึก Admin Key แล้ว");
      });
      document.getElementById("refreshBtn").addEventListener("click", loadJobs);
      document.getElementById("createBtn").addEventListener("click", createJob);
      document.getElementById("uploadFootageBtn").addEventListener("click", uploadFootage);
      document.getElementById("refreshFootageBtn").addEventListener("click", loadFootage);
      const visualsOverlay = document.getElementById("visualsOverlay");
      const visualsJobLabel = document.getElementById("visualsJobLabel");
      const vaMsg = document.getElementById("vaMsg");
      const vaBody = document.getElementById("vaBody");
      const vaAssetType = document.getElementById("vaAssetType");
      const vaInsertPos = document.getElementById("vaInsertPos");
      const vaDuration = document.getElementById("vaDuration");
      const vaSort = document.getElementById("vaSort");
      const vaPrompt = document.getElementById("vaPrompt");
      function setVaMsg(t) {
        vaMsg.textContent = t || "";
      }
      function closeVisualsPanel() {
        visualsOverlay.classList.remove("open");
        visualsOverlay.setAttribute("aria-hidden", "true");
        visualsJobId = null;
      }
      function openVisualsPanel(jobId) {
        visualsJobId = jobId;
        visualsJobLabel.textContent = short(jobId, 8);
        visualsOverlay.classList.add("open");
        visualsOverlay.setAttribute("aria-hidden", "false");
        setVaMsg("");
        loadVisualsList();
      }
      function renderVisualRows(items) {
        const rows = (items || []).map((row) => {
          const a = row.visual_asset || {};
          const st = a.status || "-";
          const actions = [];
          actions.push(
            `<button type="button" data-va="gen" data-aid="${a.id}">Generate</button>`
          );
          if (a.status === "ready") {
            actions.push(
              `<button type="button" data-va="prev" data-aid="${a.id}">Preview</button>`
            );
          }
          actions.push(
            `<button type="button" data-va="rej" data-aid="${a.id}">Reject</button>`
          );
          return `<tr>
            <td>${a.asset_type || "-"}</td>
            <td>${row.insert_position || "-"}</td>
            <td>${row.duration_sec ?? "-"}</td>
            <td><span class="status ${statusClass(st)}">${st}</span></td>
            <td>${short(a.prompt_text, 42)}</td>
            <td class="actions">${actions.join(" ")}</td>
          </tr>`;
        });
        vaBody.innerHTML = rows.length ? rows.join("") : `<tr><td colspan="6">ยังไม่มี visual</td></tr>`;
      }
      async function loadVisualsList() {
        if (!visualsJobId) return;
        try {
          const data = await api(`/admin/video-jobs/${visualsJobId}/visual-assets`);
          renderVisualRows(data.items || []);
        } catch (e) {
          setVaMsg(e.message || String(e));
        }
      }
      async function addVisualAsset() {
        if (!visualsJobId) return;
        try {
          const body = {
            asset_type: vaAssetType.value,
            insert_position: vaInsertPos.value,
            prompt_text: vaPrompt.value.trim(),
            duration_sec: Number.parseFloat(vaDuration.value) || 3,
            sort_order: Number.parseInt(vaSort.value, 10) || 0,
          };
          if (!body.prompt_text) throw new Error("กรุณาใส่ prompt_text");
          await api(`/admin/video-jobs/${visualsJobId}/visual-assets`, {
            method: "POST",
            body: JSON.stringify(body),
          });
          vaPrompt.value = "";
          setVaMsg("เพิ่ม visual แล้ว");
          await loadVisualsList();
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      async function onVisualsTableClick(ev) {
        const btn = ev.target.closest("button[data-va]");
        if (!btn) return;
        const aid = btn.dataset.aid;
        const kind = btn.dataset.va;
        try {
          if (kind === "gen") {
            await api(`/admin/visual-assets/${aid}/generate`, {
              method: "POST",
              body: JSON.stringify({}),
            });
            setVaMsg("Generate เสร็จ");
            await loadVisualsList();
          } else if (kind === "prev") {
            const data = await api(`/admin/visual-assets/${aid}/preview`);
            if (data.preview_url) window.open(data.preview_url, "_blank");
          } else if (kind === "rej") {
            await api(`/admin/visual-assets/${aid}/reject`, { method: "PATCH" });
            setVaMsg("Reject แล้ว");
            await loadVisualsList();
          }
        } catch (e) {
          alert(e.message || String(e));
        }
      }
      document.getElementById("vaAddBtn").addEventListener("click", addVisualAsset);
      document.getElementById("vaRefreshBtn").addEventListener("click", loadVisualsList);
      document.getElementById("vaCloseBtn").addEventListener("click", closeVisualsPanel);
      visualsOverlay.addEventListener("click", (ev) => {
        if (ev.target === visualsOverlay) closeVisualsPanel();
      });
      vaBody.addEventListener("click", onVisualsTableClick);
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => activateTab(btn.dataset.tab));
      });
      sourceTypeEl.addEventListener("change", toggleSourceFields);
      jobsBody.addEventListener("click", onActionClick);
      footageBody.addEventListener("click", onFootageActionClick);

      adminKeyEl.value = getKey();
      toggleSourceFields();
      loadJobs();
      loadFootage();
      refreshActiveFootageSelect();
      setInterval(() => {
        loadJobs();
        loadFootage();
      }, 10000);
    </script>
  </body>
</html>
